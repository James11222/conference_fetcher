name: Weekly conference digest

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1"

permissions:
  contents: write
  models: read

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run conference digest pipeline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_MODEL: ${{ vars.GH_MODEL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_STARTTLS: ${{ vars.SMTP_STARTTLS }}
          REPO_ROOT: ${{ github.workspace }}
        run: python -m conference_fetcher

      - name: Commit updated cache
        run: |
          if git diff --quiet -- cache.md; then
            echo "cache.md unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cache.md
          git commit -m "Update conference cache"
          git push
